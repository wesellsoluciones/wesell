<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>We Sell - Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0f1e;
  --surface:#131929;
  --red:#e03030;
  --text:#fff;
  --muted:#8899b4;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* HEADER */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 60px;
  background:rgba(10,15,30,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(224,48,48,0.2);
}

nav a{
  color:#ccc;
  margin-left:20px;
  text-decoration:none;
  font-size:12px;
}

nav a:hover{color:var(--red)}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:100vh;
}

.hero-content{
  padding:120px 80px;
}

.hero-content h1{
  font-family:'Bebas Neue';
  font-size:clamp(64px,7vw,110px);
  line-height:0.9;
}

.hero-content p{
  margin-top:20px;
  color:var(--muted);
}

.btn{
  margin-top:30px;
  padding:15px 30px;
  background:var(--red);
  border:none;
  color:#fff;
  cursor:pointer;
}

.hero-visual{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

.hero-visual::after{
  content:'';
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(224,48,48,0.2), transparent 70%);
  filter:blur(60px);
}

/* SERVICES */
.section{
  padding:130px 80px;
}

.services{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card{
  padding:40px;
  background:var(--surface);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  background:var(--surface);
}

</style>
</head>

<body>

<header>
  <div>WE SELL</div>
  <nav>
    <a href="#">Servicios</a>
    <a href="#">Nosotros</a>
    <a href="#">Contacto</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>ESCALAMOS NEGOCIOS<br>DIGITALES</h1>
    <p>Sistemas que generan ventas predecibles y crecimiento real.</p>
    <button class="btn">Quiero escalar mi negocio</button>
  </div>

  <div class="hero-visual">
    <img src="logo.png" width="300">
  </div>
</section>

<section class="section">
  <h2>Servicios</h2>
  <div class="services">
    <div class="card">Estrategia Digital</div>
    <div class="card">Automatización</div>
    <div class="card">Marketing & Ads</div>
  </div>
</section>

<footer>
  © 2026 We Sell
</footer>

</body>
</html>
