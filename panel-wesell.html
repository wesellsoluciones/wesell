<div class="login-wrap">
  <div class="logo">
    <div><span class="we">We</span><span class="st">Stock</span></div>
    <p>Panel de gestión · Acceso privado</p>
  </div>

  <div class="card">
    <h2>Iniciar sesión</h2>
    <p>Área restringida. Solo personal autorizado.</p>

    <form id="loginForm">
      
      <div class="field">
        <label for="usr">Usuario</label>
        <input 
          type="text" 
          id="usr" 
          placeholder="usuario" 
          autocomplete="username"
          required
        >
      </div>

      <div class="field">
        <label for="pwd">Contraseña</label>
        <input 
          type="password" 
          id="pwd" 
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn">
        Ingresar →
      </button>

      <div class="err" id="err">
        Usuario o contraseña incorrectos.
      </div>

    </form>
  </div>
</div>
