<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel — WeStock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-wrap{width:100%;max-width:380px}
.logo{text-align:center;margin-bottom:32px}
.logo div{font-size:26px;font-weight:800;letter-spacing:-1px}
.logo .we{color:#e03030}
.logo .st{color:#e6edf3}
.logo p{font-size:11px;color:#7d8590;letter-spacing:.12em;text-transform:uppercase;margin-top:4px}
.card{background:#161b22;border:1px solid rgba(255,255,255,.08);border-top:3px solid #e03030;border-radius:10px;padding:32px}
.card h2{font-size:17px;font-weight:700;margin-bottom:4px}
.card .sub{font-size:12px;color:#7d8590;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#7d8590;margin-bottom:6px}
.field input{width:100%;background:#0d1117;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:10px 12px;color:#e6edf3;font-size:14px;outline:none;transition:border .2s}
.field input:focus{border-color:#e03030}
.field input::placeholder{color:#484f58}
.btn{width:100%;background:#e03030;color:#fff;border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s}
.btn:hover{background:#c42828}
.btn:active{transform:scale(.98)}
.err{color:#f87171;font-size:12px;text-align:center;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div><span class="we">We</span><span class="st">Stock</span></div>
    <p>Panel de gestión · Acceso privado</p>
  </div>
  <div class="card">
    <h2>Iniciar sesión</h2>
    <p class="sub">Área restringida. Solo personal autorizado.</p>
    <div class="field">
      <label for="usr">Usuario</label>
      <input type="text" id="usr" placeholder="usuario" autocomplete="off">
    </div>
    <div class="field">
      <label for="pwd">Contraseña</label>
      <input type="password" id="pwd" placeholder="••••••••">
    </div>
    <button class="btn" id="loginBtn">Ingresar →</button>
    <div class="err" id="err">Usuario o contraseña incorrectos.</div>
  </div>
</div>
<script>
const USUARIO='wesell',PASSWORD='adminwe2026';
const $=id=>document.getElementById(id);
function ingresar(){
  if($('usr').value===USUARIO&&$('pwd').value===PASSWORD){
    $('err').style.display='none';
    // Redirigir o mostrar panel
    alert('Sesión iniciada correctamente');
  }else{
    $('err').style.display='block';
  }
}
$('loginBtn').addEventListener('click',ingresar);
$('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')ingresar()});
$('usr').addEventListener('keydown',e=>{if(e.key==='Enter')ingresar()});
['usr','pwd'].forEach(id=>$(id).addEventListener('input',()=>$('err').style.display='none'));
</script>
</body>
</html>
