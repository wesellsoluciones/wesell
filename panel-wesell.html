<div class="login-wrap">
  <div class="logo">
    <div><span class="we">We</span><span class="st">Stock</span></div>
    <p>Panel de gestión · Acceso privado</p>
  </div>

  <div class="card">
    <h2>Iniciar sesión</h2>
    <p>Área restringida. Solo personal autorizado.</p>

    <form id="loginForm">
      
      <div class="field">
        <label for="usr">Usuario</label>
        <input 
          type="text" 
          id="usr" 
          placeholder="usuario" 
          autocomplete="username"
          required
        >
      </div>

      <div class="field">
        <label for="pwd">Contraseña</label>
        <input 
          type="password" 
          id="pwd" 
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn">
        Ingresar →
      </button>

      <div class="err" id="err">
        Usuario o contraseña incorrectos.
      </div>

    </form>
  </div>
</div>

<script>
const USUARIO = 'wesell';
const PASSWORD = 'adminwe2026';
const WESTOCK_B64 = `REEMPLAZÁ_ESTO_POR_TU_BASE64_ACTUAL`;

const form = document.getElementById('loginForm');
const err = document.getElementById('err');

form.addEventListener('submit', function(e){
  e.preventDefault();

  const u = document.getElementById('usr').value.trim();
  const p = document.getElementById('pwd').value;

  if(u === USUARIO && p === PASSWORD){
    try {
      const bytes = atob(WESTOCK_B64);
      const arr = new Uint8Array(bytes.length);

      for(let i = 0; i < bytes.length; i++){
        arr[i] = bytes.charCodeAt(i);
      }

      const blob = new Blob([arr], { type: 'text/html' });
      const url = URL.createObjectURL(blob);

      window.location.href = url;

    } catch(e) {
      console.error('Error cargando panel:', e);
      mostrarError();
    }

  } else {
    mostrarError();
  }
});

function mostrarError(){
  err.style.display = 'block';

  setTimeout(() => {
    err.style.display = 'none';
  }, 3000);
}
</script>
